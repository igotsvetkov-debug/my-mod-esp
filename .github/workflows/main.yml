name: Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Create Project Structure
        run: |
          # Создаем build.gradle с правильным репозиторием
          cat <<EOF > build.gradle
          buildscript {
              repositories {
                  maven { url = 'https://minecraftforge.net' }
                  mavenCentral()
              }
              dependencies {
                  classpath group: 'net.minecraftforge.gradle', name: 'ForgeGradle', version: '5.1.+'
              }
          }
          apply plugin: 'net.minecraftforge.gradle'
          group = 'com.example'
          version = '1.0'
          archivesBaseName = 'my-esp-mod'
          java.toolchain.languageVersion = JavaLanguageVersion.of(8)
          minecraft {
              mappings channel: 'official', version: '1.16.5'
          }
          EOF
          
          # Создаем файлы мода
          mkdir -p src/main/java/com/example/esp
          cat <<EOF > src/main/java/com/example/esp/EspMod.java
          package com.example.esp;
          import net.minecraftforge.fml.common.Mod;
          @Mod("myespmod")
          public class EspMod {}
          EOF

          mkdir -p src/main/resources/META-INF
          cat <<EOF > src/main/resources/META-INF/mods.toml
          modLoader="javafml"
          loaderVersion="[36,)"
          license="MIT"
          [[mods]]
          modId="myespmod"
          version="1.0"
          displayName="My ESP Mod"
          EOF
          
          # Устанавливаем конкретную версию Gradle (7.6), которая понимает Forge 1.16.5
          gradle wrapper --gradle-version 7.6
      - name: Build with Gradle
        run: ./gradlew build --no-daemon
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyESPMod-1.16.5
          path: build/libs/*.jar
